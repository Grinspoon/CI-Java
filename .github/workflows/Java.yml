name: Java CI with Maven

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        env:
          CHROME_OPTS: "--headless --no-sandbox --disable-dev-shm-usage"
        run: mvn -B clean test -Dwebdriver.chrome.driver=/usr/bin/chromedriver